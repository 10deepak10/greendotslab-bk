<!-- Expanded Box (Modal Dropdown) -->
<div id="mobile-search-dropdown"

  <!-- Tabs -->

    <button class="text-gray-500 hover:text-brand-green transition font-medium pb-2">Collections</button>
  </div>

  <!-- Search Results -->
  <div class="max-h-[50vh] overflow-y-auto px-4 pb-4">
    <ul class="space-y-3">
      <li class="flex items-center gap-3 hover:bg-gray-50 p-1.5 rounded-lg transition cursor-pointer">
        <img src="https://images.unsplash.com/photo-1615873968403-89e068629265?w=80&q=80" alt="Product"
          class="w-[48px] h-[48px] object-cover rounded shadow-sm">
        <div>
          <p class="font-bold text-[13px] text-gray-900 leading-tight">Nightingale Ambassador Bed Frame</p>
          <p class="text-[12px] text-gray-600 mt-0.5">£529.99 <span
              class="line-through text-gray-400">£699.00</span>
          </p>
        </div>
      </li>
      <li class="flex items-center gap-3 hover:bg-gray-50 p-1.5 rounded-lg transition cursor-pointer">
        <img src="https://images.unsplash.com/photo-1588046130717-0eb0c9a3ba15?w=80&q=80" alt="Product"
          class="w-[48px] h-[48px] object-cover rounded shadow-sm">
        <div>
          <p class="font-bold text-[13px] text-gray-900 leading-tight">Calvin Divan Drawer Storage Bed</p>
          <p class="text-[12px] text-gray-600 mt-0.5">£279.99 <span
              class="line-through text-gray-400">£499.00</span>
          </p>
        </div>
      </li>
      <li class="flex items-center gap-3 hover:bg-gray-50 p-1.5 rounded-lg transition cursor-pointer">
        <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=80&q=80" alt="Product"
          class="w-[48px] h-[48px] object-cover rounded shadow-sm">
        <div>
          <p class="font-bold text-[13px] text-gray-900 leading-tight">Leymond Panelled Wingback Bed</p>
          <p class="text-[12px] text-gray-600 mt-0.5">£329.99 <span
              class="line-through text-gray-400">£499.00</span>
          </p>
        </div>
      </li>
    </ul>
  </div>
</div>

<!-- Actual Search Bar (On top) -->
<div class="relative w-full h-[40px] z-[60]">
  <div
    class="flex items-center border border-gray-800 rounded-full h-full overflow-hidden px-3 bg-white w-full transition-all duration-300"
    id="mobile-search-container">
    <img src="/assets/icons/search.svg" alt="Search" class="w-4 h-4 text-gray-500 mr-2">
    <input id="mobile-search-input" type="text" placeholder="Search for collections"
      class="flex-1 text-[14px] placeholder:text-gray-500 text-gray-800 outline-none bg-transparent h-full min-w-0"
      autocomplete="off" />
    <button id="mobile-search-clear"
      class="p-1 hover:text-brand-green transition opacity-0 pointer-events-none mx-0.5">
      <img src="/assets/icons/close.svg" alt="Clear" width="16" height="16">
    </button>
    <span class="text-gray-300 mx-0.5">|</span>
    <button id="mobile-search-mic" class="p-1 hover:text-brand-green transition ml-0.5">
      <img src="/assets/icons/mic.svg" alt="Voice Search" width="16" height="16">
    </button>
  </div>
</div>
