          class="w-[60px] h-[60px] object-cover rounded shadow-sm">
        <div>
          <p class="font-bold text-sm text-gray-900 leading-tight">Calvin Divan Drawer Storage Bed With Footboard</p>

</div>

<!-- Actual Search Bar (On top) -->
<div class="relative w-full h-[48px] z-[60]">
  <div
    class="flex items-center border border-gray-800 rounded-full h-full overflow-hidden px-4 bg-white w-full transition-all duration-300"
    id="desktop-search-container">
    <img src="/assets/icons/search.svg" alt="Search" class="w-5 h-5 text-gray-500 mr-2">
    <input id="desktop-search-input" type="text" placeholder="Search for collections"
      class="flex-1 text-[16px] placeholder:text-gray-500 text-gray-800 outline-none bg-transparent h-full min-w-0"
      autocomplete="off" />
    <button id="desktop-search-clear"
      class="p-1 hover:text-brand-green transition opacity-0 pointer-events-none mx-1">
      <img src="/assets/icons/close.svg" alt="Clear" width="18" height="18">
    </button>
    <span class="text-gray-300 mx-1">|</span>
    <button id="desktop-search-mic" class="p-1 hover:text-brand-green transition ml-1">
      <img src="/assets/icons/mic.svg" alt="Voice Search" width="18" height="18">
    </button>
  </div>
</div>
