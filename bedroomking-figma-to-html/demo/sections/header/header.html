<!-- Header -->
<header class="bg-white shadow-sm relative z-50">
  <!-- Desktop Header Row -->
  <div class="max-w-7xl mx-auto px-4 md:px-8 py-2 hidden md:flex items-center gap-6">
    <div class="flex w-full items-center">
      <!-- Logo -->
      <a href="#" class="shrink-0">
        <img src="/assets/logo.png" alt="Bedroom King" class="w-[106px]" />
      </a>
      <!-- Search Component -->
      <div class="grow max-w-[800px] mx-4 md:mx-10 font-serif h-[48px] relative z-[60]"
        data-include="sections/search/desktop-search.html"></div>
    </div>
    <!-- Right Icons -->
    <div class="flex items-center gap-2 text-gray-600 shrink-0 px-8">
      <button class="relative hover:text-brand-green transition md:mr-2">
        <img src="/assets/icons/header-header.svg" alt="" width="18" height="18">
        <span class="absolute -top-1.5 -right-1.5 bg-brand-green text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center font-bold">2</span>
      </button>
      <button class="hover:text-brand-green transition"> 
        <img src="/assets/icons/header-header-2.svg" alt="" width="18" height="18">
      </button>
      <span class="text-gray-500 text-xl font-medium">|</span>
      <button class="flex items-center gap-2 md:ml-4 text-sm text-gray-700 hover:text-brand-green transition font-medium">
        ENG
        <img src="/assets/icons/chevron-down.svg" alt="" width="2" class="w-4 h-4">
      </button>
    </div>
  </div>

  <!-- Mobile Header Row -->
  <div class="md:hidden flex items-center justify-between px-4 py-2 bg-white">
    <!-- Logo -->
    <a href="#" class="shrink-0">
      <img src="/assets/logo.png" alt="Bedroom King" class="w-[90px]" />
    </a>
    <!-- Right Icons -->
    <div class="flex items-center gap-1">
      <button class="relative hover:text-brand-green transition p-2">
        <img src="/assets/icons/header-header-4.svg" alt="" width="18" height="18">
        <span class="absolute top-0 right-0 bg-brand-green text-white text-[8px] rounded-full w-3.5 h-3.5 flex items-center justify-center font-bold">2</span>
      </button>
      <button class="hover:text-brand-green transition p-2"> 
        <img src="/assets/icons/header-header-2.svg" alt="" width="18" height="18">
      </button>
      <button class="flex items-center gap-1 text-sm text-gray-700 hover:text-brand-green transition font-medium p-2">
        ENG
        <img src="/assets/icons/chevron-down.svg" alt="" width="2" class="w-3 h-3">
      </button>
      <!-- Burger Menu -->
      <button id="mobile-menu-btn" class="p-2 text-brand-green hover:text-brand-primary transition" aria-label="Menu">
        <img src="/assets/icons/menu.svg" alt="Open Menu" width="24" height="24">
      </button>
    </div>
  </div>

  <!-- Mobile Search Bar Component -->
  <div class="md:hidden px-4 pb-4 z-[60]">
    <div class="relative w-full h-[40px]" data-include="sections/search/mobile-search.html"></div>
  </div>

  <!-- Desktop Navigation -->
  <nav class="font-serif bg-brand-light-green border-t border-gray-200 overflow-x-auto hidden md:block">
    <ul class="max-w-7xl mx-auto px-4 md:px-8 flex justify-between items-center font-medium text-[16px] text-brand-green whitespace-nowrap">
      <li class="group">
        <a href="collection.html" class="flex items-center gap-1 py-3 transition">
          Bed Frames
          <img src="/assets/icons/chevron-down.svg" alt="" width="2" class="w-4 h-4">
        </a>
        <!-- Mega Menu Dropdown Injected Here -->
        <div data-include="sections/header/mega-menu.html"></div>
      </li>
      <li><a href="#" class="block px-3 py-3 transition">Divan Beds</a></li>
      <li><a href="#" class="block px-3 py-3 transition">Kid Beds</a></li>
      <li><a href="#" class="block px-3 py-3 transition">Luxury Beds</a></li>
      <li><a href="#" class="block px-3 py-3 transition">TV Beds</a></li>
      <li><a href="#" class="block px-3 py-3 transition">Wingback Beds</a></li>
      <li><a href="#" class="block px-3 py-3 transition">Ottoman Storage Beds</a></li>
      <li><a href="#" class="block px-3 py-3 transition">High End Beds</a></li>
      <li><a href="#" class="block px-3 py-3 transition">Mattresses</a></li>
      <li><a href="#" class="block px-3 py-3 transition">Accessories</a></li>
    </ul>
  </nav>
  <!-- Search Modal Overlay -->
  <div id="search-modal-overlay"
    class="fixed inset-0 bg-black/50 z-[55] opacity-0 pointer-events-none transition-opacity duration-300"></div>
</header>
