<!-- SECTION LOADER -->
<script>
    async function loadSections(container = document) {
      const includes = container.querySelectorAll('[data-include]');
      if (includes.length === 0) return;

    const promises = Array.from(includes).map(async (el) => {
      const url = el.getAttribute('data-include');
      try {
        const response = await fetch(url);
        if (response.ok) {
          el.innerHTML = await response.text();
          await loadSections(el);
        } else {
          el.innerHTML = 'Error loading section: ' + url;
        }
      } catch (err) {
        el.innerHTML = 'Fetch error: ' + err.message;
      }

      el.removeAttribute('data-include');
    });

    await Promise.all(promises);
  }

  loadSections().then(() => {
    console.log('All sections loaded. Initializing global JS...');
    const script = document.createElement('script');
    script.src = 'global.js';
    document.body.appendChild(script);
  });
</script>
