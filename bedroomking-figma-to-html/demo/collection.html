<!-- SECTION: announcement-bar -->

<!-- SECTION: header -->
<div data-include="sections/header/header.html"></div>

<!-- SECTION: mobile-menu -->
<div data-include="sections/mobile-menu/mobile-menu.html"></div>

<main>
    <!-- SECTION: page-banner -->
    <div data-include="sections/common/page-banner.html"></div>

    <!-- SECTION: collection-grid -->
    <div data-include="sections/collection/collection-grid.html"></div>
</main>

<!-- SECTION: footer -->
<div data-include="sections/footer/footer.html"></div>

<!-- SECTION LOADER -->
<script>
    async function loadSections(container = document) {
      const includes = container.querySelectorAll('[data-include]');
      if (includes.length === 0) return;

    const promises = Array.from(includes).map(async (el) => {
      const url = el.getAttribute('data-include');
      try {
        const response = await fetch(url);
        if (response.ok) {
          el.innerHTML = await response.text();
          // Recursively load any new includes inside the fetched content
          await loadSections(el);
        } else {
          el.innerHTML = 'Error loading section: ' + url;
        }
      } catch (err) {
        el.innerHTML = 'Fetch error: ' + err.message;
      }

      // Remove attribute so it's not processed again if called globally
      el.removeAttribute('data-include');
    });

    await Promise.all(promises);
  }

    // Initial load
    loadSections().then(() => {
    console.log('All sections loaded. Initializing global JS...');
    const script = document.createElement('script');
    script.src = 'global.js';
    document.body.appendChild(script);
  });
</script>
</body>
</html>
